name: CleanupOldWorkflows

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    
    steps:
      - name: Cleanup specific workflow runs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # 指定要清理的workflow名称（支持通配符）
          TARGET_WORKFLOWS=(
            "ProxyConvert.yml"
          )
          
          for workflow_name in "${TARGET_WORKFLOWS[@]}"; do
            echo "Processing workflow: $workflow_name"
            
            # 获取特定workflow的ID
            workflow_id=$(gh api repos/$REPO/actions/workflows \
              --jq ".workflows[] | select(.name==\"$workflow_name\" or .path==\".github/workflows/$workflow_name\") | .id")
            
            if [ -n "$workflow_id" ]; then
              echo "Found workflow ID: $workflow_id"
              
              # 获取该workflow的所有runs，跳过最近的3条
              runs=$(gh api repos/$REPO/actions/workflows/$workflow_id/runs --paginate \
                --jq '.workflow_runs | sort_by(.created_at) | reverse | .[3:] | .[] | .id')
              
              for run_id in $runs; do
                echo "Deleting run: $run_id"
                gh api -X DELETE repos/$REPO/actions/runs/$run_id
                sleep 0.5
              done
            else
              echo "Workflow $workflow_name not found"
            fi
          done
