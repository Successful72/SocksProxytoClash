# 工作流配置
name: Update Clash Proxies

on:
  schedule:
    # 每小时整点触发（UTC）
    - cron: "0 * * * *"
  workflow_dispatch:

# 这里的 permissions 只影响 GITHUB_TOKEN，清理步骤不会再用它
permissions:
  contents: read

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 用于 push
      actions: read     # 只读即可

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pyyaml pytz

      - name: Run generator script
        run: python DealProxies.py

      - name: Commit & push if changed
        run: |
          CURRENT_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Proxies.yaml
          git diff --cached --quiet || \
            git commit -m "chore: update clash proxies [${CURRENT_TIME} CST]"
          git push

      # 清理Workflow Runs记录
      # 生成GitHub App token
      - name: Generate GitHub App token
        id: app-token
        uses: tibdex/github-app-token@v2
        with:
          app_id: ${{ secrets.APP_ID }}
          private_key: ${{ secrets.APP_PRIVATE_KEY }}

      # 使用App token 清理 Workflow Runs
      - name: Clean up old workflow records
        run: python .github/scripts/CleanWorkflowRecords.py
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          WORKFLOW_NAME: "Update Clash Proxies"
          KEEP_COUNT: 3
